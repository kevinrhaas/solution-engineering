<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sample Job Console</title>
  <link rel="stylesheet" href="/pentaho/content/common-ui/resources/themes/ruby/globalRuby.css" />
  <style>
    body {
      margin: 0;
      padding: 24px;
      box-sizing: border-box;
    }

    .console-shell {
      max-width: 900px;
      margin: 0 auto;
    }

    .console-header {
      margin-bottom: 20px;
    }

    .console-card {
      padding: 20px;
    }

    .console-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }

    .console-actions {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .console-status {
      min-height: 22px;
      margin-top: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .console-status-detail {
      margin-top: 4px;
      min-height: 18px;
      opacity: 0.8;
      font-size: 12px;
    }

    .status-icon {
      width: 14px;
      height: 14px;
      display: inline-block;
      border-radius: 999px;
      flex: 0 0 14px;
    }

    .status-icon.is-running {
      border: 2px solid #cfcfcf;
      border-top-color: #6b6b6b;
      animation: spin 0.7s linear infinite;
    }

    .status-icon.is-success {
      background: #2e8b57;
      position: relative;
    }

    .status-icon.is-success::after {
      content: "";
      position: absolute;
      left: 4px;
      top: 1px;
      width: 4px;
      height: 8px;
      border: solid #fff;
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .status-icon.is-error {
      background: #b00020;
      position: relative;
    }

    .status-icon.is-error::before,
    .status-icon.is-error::after {
      content: "";
      position: absolute;
      left: 6px;
      top: 2px;
      width: 2px;
      height: 10px;
      background: #fff;
    }

    .status-icon.is-error::before {
      transform: rotate(45deg);
    }

    .status-icon.is-error::after {
      transform: rotate(-45deg);
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    select {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
    }

    input[type="text"] {
      width: 100%;
      box-sizing: border-box;
      padding: 8px;
    }

    .custom-path-row {
      display: none;
    }

    .custom-path-row.is-visible {
      display: block;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main class="console-shell">
    <header class="console-header">
      <h1>Sample Job Console</h1>
    </header>

    <section class="console-card">
      <div class="console-grid">
        <label for="jobSelect">Job</label>
        <select id="jobSelect" aria-label="Select a Pentaho job">
          <option value="/public/pdc-analysis/utility/main/j-refresh-only.kjb">Refresh Only (FDW MVs)</option>
          <option value="/public/pdc-analysis/utility/lineage/j-lineage-main.kjb">Reload Lineage Data</option>
          <option value="/public/pdc-analysis/utility/main/j-main-script.kjb">Full Build</option>
          <option value="__custom__">Custom...</option>
        </select>

        <div id="customPathRow" class="custom-path-row">
          <label for="jobPathInput">Custom Job Path</label>
          <input
            id="jobPathInput"
            type="text"
            value=""
            placeholder="/public/path/to/your-job.kjb"
            aria-label="Custom Pentaho job path"
          />
        </div>

        <div class="console-actions">
          <button id="runJobButton" type="button">Run Job</button>
        </div>

        <div id="jobStatus" class="console-status" role="status" aria-live="polite">
          <span id="jobStatusIcon" class="status-icon" aria-hidden="true"></span>
          <span id="jobStatusText"></span>
        </div>
        <div id="jobStatusDetail" class="console-status-detail" aria-live="polite"></div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var jobSelect = document.getElementById("jobSelect");
      var jobPathInput = document.getElementById("jobPathInput");
      var customPathRow = document.getElementById("customPathRow");
      var runJobButton = document.getElementById("runJobButton");
      var jobStatusIcon = document.getElementById("jobStatusIcon");
      var jobStatusText = document.getElementById("jobStatusText");
      var jobStatusDetail = document.getElementById("jobStatusDetail");

      jobSelect.addEventListener("change", function () {
        if (jobSelect.value === "__custom__") {
          customPathRow.classList.add("is-visible");
          jobPathInput.focus();
        } else {
          customPathRow.classList.remove("is-visible");
        }
      });

      function getSelectedJobPath() {
        if (jobSelect.value === "__custom__") {
          return (jobPathInput.value || "").trim();
        }
        return jobSelect.value;
      }

      function setStatus(message, state, detail) {
        jobStatusText.textContent = message;
        jobStatusDetail.textContent = detail || "";
        jobStatusIcon.className = "status-icon";
        if (state === "running") {
          jobStatusIcon.classList.add("is-running");
        } else if (state === "success") {
          jobStatusIcon.classList.add("is-success");
        } else if (state === "error") {
          jobStatusIcon.classList.add("is-error");
        }
      }

      function buildExecuteJobUrl(jobPath) {
        var pathId = jobPath.replace(/^\//, "").split("/").join(":");
        return "/pentaho/api/repos/:" + pathId + "/generatedContent";
      }

      function buildKettleStatusUrl() {
        return "/pentaho/kettle/status/?xml=Y";
      }

      function getJobNameFromPath(jobPath) {
        var parts = jobPath.split("/");
        var fileName = parts[parts.length - 1] || "";
        return fileName.replace(/\.kjb$/i, "");
      }

      function parseJobLogDate(value) {
        if (!value) {
          return 0;
        }

        var match = value.trim().match(/^(\d{4})\/(\d{2})\/(\d{2})\s+(\d{2}):(\d{2}):(\d{2})(?:\.(\d{1,3}))?$/);
        if (!match) {
          return 0;
        }

        var year = parseInt(match[1], 10);
        var month = parseInt(match[2], 10) - 1;
        var day = parseInt(match[3], 10);
        var hour = parseInt(match[4], 10);
        var minute = parseInt(match[5], 10);
        var second = parseInt(match[6], 10);
        var ms = parseInt(match[7] || "0", 10);

        return new Date(year, month, day, hour, minute, second, ms).getTime();
      }

      function parseLatestJobStatus(xmlText, jobName, startedAt) {
        if (!xmlText) {
          return null;
        }

        var parser = new DOMParser();
        var xml = parser.parseFromString(xmlText, "text/xml");
        var jobs = xml.querySelectorAll("jobstatus");
        var latestMatch = null;
        var latestEpoch = 0;

        for (var i = 0; i < jobs.length; i++) {
          var nameNode = jobs[i].querySelector("jobname");
          if (!nameNode || (nameNode.textContent || "").trim() !== jobName) {
            continue;
          }

          var statusNode = jobs[i].querySelector("status_desc");
          var logDateNode = jobs[i].querySelector("log_date");
          var logNode = jobs[i].querySelector("logging_string");
          var rawLog = logNode && logNode.textContent ? logNode.textContent.trim() : "";
          var cleanLog = rawLog.replace(/^<!\[CDATA\[/, "").replace(/\]\]>$/, "").trim();
          var logDate = logDateNode && logDateNode.textContent ? logDateNode.textContent.trim() : "";
          var epoch = parseJobLogDate(logDate);

          if (!latestMatch || epoch >= latestEpoch) {
            latestEpoch = epoch;
            latestMatch = {
              status: statusNode && statusNode.textContent ? statusNode.textContent.trim() : "",
              log: cleanLog,
              logDate: logDate,
              epoch: epoch
            };
          }
        }

        if (!latestMatch) {
          return null;
        }

        if (latestMatch.epoch && latestMatch.epoch < (startedAt - 5000)) {
          return null;
        }

        return latestMatch;
      }

      function startStatusPolling(jobName, startedAt) {
        var timerId = null;
        var stopped = false;

        async function pollOnce() {
          if (stopped) {
            return;
          }

          try {
            var response = await fetch(buildKettleStatusUrl(), {
              method: "GET",
              credentials: "same-origin",
              headers: {
                "Accept": "application/xml, text/xml, */*"
              }
            });

            if (!response.ok) {
              return;
            }

            var xmlText = await response.text();
            var latest = parseLatestJobStatus(xmlText, jobName, startedAt);
            var elapsed = Math.max(0, Math.round((Date.now() - startedAt) / 1000));

            if (latest) {
              var detail = "Elapsed: " + elapsed + "s | Status: " + (latest.status || "Running");
              if (latest.logDate) {
                detail += " | Time: " + latest.logDate;
              }
              if (latest.log) {
                detail += " | Log: " + latest.log;
              }
              setStatus("Running job...", "running", detail);
            } else {
              setStatus("Running job...", "running", "Elapsed: " + elapsed + "s | Status: Starting...");
            }
          } catch (error) {
            var elapsedOnError = Math.max(0, Math.round((Date.now() - startedAt) / 1000));
            setStatus("Running job...", "running", "Elapsed: " + elapsedOnError + "s");
          }
        }

        pollOnce();
        timerId = window.setInterval(pollOnce, 2000);

        return function stopPolling() {
          stopped = true;
          if (timerId) {
            window.clearInterval(timerId);
          }
        };
      }

      function parseResponseMessage(responseText) {
        if (!responseText) {
          return "Job request submitted.";
        }

        if (responseText.indexOf("The file has processed successfully.") !== -1 || responseText.indexOf("Finished!") !== -1) {
          return "Job completed successfully.";
        }

        var parser = new DOMParser();
        var xml = parser.parseFromString(responseText, "text/xml");
        var messageNode = xml.querySelector("message");

        if (messageNode && messageNode.textContent) {
          return messageNode.textContent.trim();
        }

        return "Job request submitted.";
      }

      async function executeJob() {
        var jobPath = getSelectedJobPath();
        var jobName = getJobNameFromPath(jobPath);
        var startedAt = Date.now();
        var stopPolling = function () {};

        if (!jobPath) {
          setStatus("Enter a job path first.", "error", "");
          return;
        }

        setStatus("Running job...", "running", "Elapsed: 0s");
        runJobButton.disabled = true;
        runJobButton.textContent = "Running...";
        stopPolling = startStatusPolling(jobName, startedAt);

        try {
          var response = await fetch(buildExecuteJobUrl(jobPath), {
            method: "GET",
            credentials: "same-origin",
            headers: {
              "Accept": "text/html, application/xml, text/xml, */*"
            }
          });

          var responseText = await response.text();

          if (!response.ok) {
            throw new Error(responseText || "Request failed with status " + response.status + ".");
          }

          stopPolling();
          var elapsed = Math.max(0, Math.round((Date.now() - startedAt) / 1000));
          setStatus(parseResponseMessage(responseText), "success", "Completed in " + elapsed + "s");
        } catch (error) {
          stopPolling();
          setStatus("Execution failed: " + (error && error.message ? error.message : "Unknown error"), "error", "");
        } finally {
          stopPolling();
          runJobButton.disabled = false;
          runJobButton.textContent = "Run Job";
        }
      }

      runJobButton.addEventListener("click", executeJob);
    })();
  </script>
</body>
</html>
