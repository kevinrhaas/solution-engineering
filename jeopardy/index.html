<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jeopardy Board App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <header>
            <div class="controls">
                <button id="btn-upload" onclick="document.getElementById('file-upload').click()">Upload Game Profile</button>
                <input type="file" id="file-upload" accept=".json" style="display: none;" onchange="handleFileUpload(event)">
                <select id="profile-select" onchange="loadSelectedProfile()">
                    <option value="">-- Select Game Profile --</option>
                </select>
                <a id="btn-download" onclick="downloadProfile()" title="Download current game profile">&#x2B07; JSON</a>
                <button id="btn-reset" onclick="confirmReset()">Reset Board</button>
            </div>
            
            <div class="scoreboard">
                <div class="player">
                    <h2 class="player-name" onclick="addScore(1)">Player 1</h2>
                    <div class="score-display">
                        <button onclick="manualScore(1, -100)">-</button>
                        <span id="score-p1">$0</span>
                        <button onclick="manualScore(1, 100)">+</button>
                    </div>
                </div>
                <div class="player">
                    <h2 class="player-name" onclick="addScore(2)">Player 2</h2>
                    <div class="score-display">
                        <button onclick="manualScore(2, -100)">-</button>
                        <span id="score-p2">$0</span>
                        <button onclick="manualScore(2, 100)">+</button>
                    </div>
                </div>
                <div class="player">
                    <h2 class="player-name" onclick="addScore(3)">Player 3</h2>
                    <div class="score-display">
                        <button onclick="manualScore(3, -100)">-</button>
                        <span id="score-p3">$0</span>
                        <button onclick="manualScore(3, 100)">+</button>
                    </div>
                </div>
            </div>
            <div class="active-info">
                <span>Active Question Value: <strong id="active-value">None</strong></span>
                <span style="font-size: 0.8em; opacity: 0.8;">(Click a Player Name above to award the Active Value)</span>
            </div>
        </header>

        <main id="board-container">
            <div id="board" class="jeopardy-board">
                <!-- Board generated via JS -->
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
